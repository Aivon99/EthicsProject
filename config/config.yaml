# Paths
paths:

  
  # Reference dataset directory
  # (from Aequitas collection on Zenodo: https://zenodo.org/records/17592007)
  student_dataset_dir: student-dataset
  raw_data: Data/original.csv  # working copy of the original Aequitas dataset

  link: "stud" # in case we cant push repo with csv, upload on cloud and add code to fetch, add here link



  # Goal 1 output: the preprocessed dataset used as input for Goal 2.
  processed_data: Data/processed.csv
  train_data:     Data/train.csv
  test_data:      Data/test.csv

  results_dir:   results
  processed_dir: results/processed  
  figures_dir:   results/figures
  synthetic_dir: results/synthetic





#  Reproducibility 
seed: 42  # my fav

#  Target variable 
target:
  score_column:  score_MAT         # continuous score used to build the target
  percentile:    75                # positive class: score >= this percentile
  column_name:   target_high_perf  # name of the binary column

# ---- Dataset schema 
dataset:

  performance_columns:
    - score_MAT
    - level_MAT
    - score_LEN
    - level_LEN
    - score_ING
    - level_ING

  protected_attributes:
    - name: s_gender                                            # C1  — 0.55%
      source_col: s_gender
      binarise: false

    - name: f_mother_edu_binary                                 # C2  — 16.1%
      source_col: f_mother_education_level
      binarise: median
      labels: [low_edu, high_edu]

    - name: f_father_edu_binary                                 # C3  — 27.5%
      source_col: f_father_education_level
      binarise: median
      labels: [low_edu, high_edu]

    - name: f_mother_occ_binary                                 # C4
      source_col: f_mother_occupation
      binarise: median
      labels: [low_occ, high_occ]

    - name: f_father_occ_binary                                 # C5
      source_col: f_father_occupation
      binarise: median
      labels: [low_occ, high_occ]

    - name: f_immigrant_binary                                  # C6  — 0.03%
      source_col: s_birth_country
      binarise: equality
      match_value: Spain
      labels: [immigrant, native]

    - name: f_books_binary                                      # C8  — 27.4%
      source_col: f_extent_of_books_at_home
      binarise: median
      labels: [few, many]

    - name: f_adults_read_binary                                # C9
      source_col: f_frequency_of_see_adult_read
      binarise: equality
      match_value: daily
      labels: [not_daily, daily]

    - name: p_school_type_binary                                # C10
      source_col: p_public_or_private
      binarise: false

    - name: p_island_binary                                     # C11
      source_col: p_island
      binarise: false

    - name: p_teachers_change_binary                            # C12
      source_col: p_percentage_of_teachers_changed_school_last_year
      binarise: median
      labels: [low_change, high_change]

    - name: f_ESCS_binary                                       # C13 — 13.2%
      source_col: f_ESCS
      binarise: threshold
      threshold: 0
      labels: [disadvantaged, advantaged]

  id_columns:
    - id_questionnaire
    - id_student_original
    - id_year
    - id_grade
    - id_school
    - id_student_16_19
    - id_school_16_19

  categorical_columns:
    - s_gender
    - s_birth_country
    - f_frequency_of_see_adult_read
    - p_public_or_private
    - p_island

# ---- Synthetic generation 
generation:
  # How many synthetic rows to produce per method
  n_synthetic_samples: null  # default: null => match the size of the training set

  # Methods to run
  methods:
    ctgan:
      enabled:     true
      epochs:      300
      batch_size:  500

    tvae:
      enabled:     true
      epochs:      300
      batch_size:  500

    gaussian_copula:
      enabled:     true

    smote:
      enabled:     true
      k_neighbors: 5

  # Sub-directory names under paths.synthetic_dir
  output_subdirs:
    ctgan:            ctgan
    tvae:             tvae
    gaussian_copula:  copula
    smote:            smote

  # File name template
  output_filename_template: "synthetic_{method}.csv"



# ---- xperiments

experiments:
  baseline_label: "real"

  classifiers:
    logistic_regression:
      max_iter:      1000
      C:             1.0
      solver:        lbfgs
      class_weight:  balanced

    xgboost:
      n_estimators:      200
      max_depth:         6
      learning_rate:     0.1
      subsample:         0.8
      colsample_bytree:  0.8
      scale_pos_weight:  auto
      eval_metric:       logloss

    mlp:
      hidden_layer_sizes:   [128, 64]
      activation:           relu
      max_iter:             300
      early_stopping:       true
      validation_fraction:  0.1
      n_iter_no_change:     10
      learning_rate_init:   0.001
      batch_size:           256      



